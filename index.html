<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Rong's Daily Stars ♓</title>
    <meta name="theme-color" content="#c5a3f7">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <meta name="apple-mobile-web-app-title" content="Daily Stars">
    <link rel="manifest" href="manifest.json">
    <link rel="apple-touch-icon" href="icon-192.png">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;1,400;1,500;1,600&family=Quicksand:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css?v=4">
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>♓</text></svg>">
</head>
<body>
    <div class="bubbles" id="bubbles"></div>
    <div class="cursor-bubbles" id="cursor-bubbles" aria-hidden="true"></div>
    <div class="confetti" id="confetti"></div>
    <svg class="constellation" viewBox="0 0 400 220" preserveAspectRatio="xMidYMid meet" aria-hidden="true">
        <g class="constellation-lines" stroke="rgba(255,255,255,0.55)" stroke-width="0.6" fill="none" stroke-linecap="round">
            <path d="M 60 56 L 102 82 L 142 96 L 182 108 L 222 100 L 262 86 L 302 66 L 342 46"/>
            <path d="M 182 108 L 196 138 L 212 168 L 226 198"/>
        </g>
        <g class="constellation-stars" id="constellation-stars" fill="white">
            <circle cx="60"  cy="56"  r="1.6" data-star="0" style="--twinkle-delay:0s"/>
            <circle cx="102" cy="82"  r="1.2" data-star="1" style="--twinkle-delay:.6s"/>
            <circle cx="142" cy="96"  r="2.0" data-star="2" style="--twinkle-delay:1.4s"/>
            <circle cx="182" cy="108" r="2.6" data-star="3" style="--twinkle-delay:.2s"/>
            <circle cx="222" cy="100" r="1.6" data-star="4" style="--twinkle-delay:1.1s"/>
            <circle cx="262" cy="86"  r="1.2" data-star="5" style="--twinkle-delay:.8s"/>
            <circle cx="302" cy="66"  r="1.6" data-star="6" style="--twinkle-delay:1.7s"/>
            <circle cx="342" cy="46"  r="2.2" data-star="7" style="--twinkle-delay:.4s"/>
            <circle cx="196" cy="138" r="1.2" data-star="8" style="--twinkle-delay:1.3s"/>
            <circle cx="212" cy="168" r="1.6" data-star="9" style="--twinkle-delay:.9s"/>
            <circle cx="226" cy="198" r="1.2" data-star="10" style="--twinkle-delay:1.6s"/>
        </g>
    </svg>
    <button class="sound-toggle" id="sound-toggle" aria-label="Toggle ambient sound" title="Ambient sound">
        <span class="sound-icon" id="sound-icon">𝄞</span>
    </button>
    <div class="container" id="page-content">
        <div class="streak-chip" id="streak-chip"></div>
        <p class="streak-note" id="streak-note"></p>
        <header class="header">
            <div class="pisces-symbol" id="pisces-symbol">♓</div>
            <h1 class="greeting" id="greeting"></h1>
            <p class="hidden-phrase" id="hidden-phrase"></p>
            <p class="date" id="date"></p>
            <p class="zodiac-label">Pisces · Water Sign · Dreamer</p>
            <div class="lucky-strip">
                <div class="lucky-item">
                    <div class="lucky-value" id="lucky-number"></div>
                    <div class="lucky-sublabel">number</div>
                </div>
                <div class="lucky-item">
                    <div class="lucky-value"><span class="lucky-color-dot" id="lucky-color-dot"></span><span id="lucky-color-name"></span></div>
                    <div class="lucky-sublabel">color</div>
                </div>
                <div class="lucky-item">
                    <div class="lucky-value" id="lucky-element"></div>
                    <div class="lucky-sublabel">element</div>
                </div>
                <div class="lucky-item lucky-moon" id="lucky-moon">
                    <div class="lucky-value"><span class="moon-glyph" id="moon-glyph"></span><span id="moon-name"></span></div>
                    <div class="lucky-sublabel">moon</div>
                </div>
            </div>
        </header>

        <p class="mood-label">Today's energy</p>
        <p class="mood-word" id="mood-word"></p>

        <section class="scores" id="scores"></section>

        <section class="tarot-section" id="tarot-section">
            <p class="tarot-label">Today's card</p>
            <div class="tarot-card" id="tarot-card" role="button" tabindex="0" aria-label="Reveal today's card">
                <div class="tarot-card-inner">
                    <div class="tarot-card-face tarot-card-back">
                        <div class="tarot-back-pattern">♓</div>
                        <p class="tarot-back-text">tap to draw</p>
                    </div>
                    <div class="tarot-card-face tarot-card-front">
                        <p class="tarot-card-number" id="tarot-card-number"></p>
                        <h3 class="tarot-card-name" id="tarot-card-name"></h3>
                        <p class="tarot-card-reading" id="tarot-card-reading"></p>
                    </div>
                </div>
            </div>
        </section>

        <footer class="quote-section">
            <p class="quote-text" id="quote"></p>
            <p class="quote-author" id="quote-author"></p>
        </footer>

        <button class="heatmap-toggle" id="heatmap-toggle" aria-expanded="false">
            <span>your year so far</span>
            <span class="heatmap-chevron">▾</span>
        </button>
        <div class="heatmap-drawer" id="heatmap-drawer" aria-hidden="true">
            <p class="heatmap-stats" id="heatmap-stats"></p>
            <div class="heatmap-grid" id="heatmap-grid"></div>
            <p class="heatmap-legend"><span>less</span><span class="heatmap-legend-cells"><i></i><i></i><i></i><i></i></span><span>more</span></p>
        </div>
    </div>
    <div class="milestone-toast" id="milestone-toast" aria-live="polite"></div>
    <script src="script.js?v=4"></script>
</body>
</html>
