<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rong's Daily Stars ♓</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>♓</text></svg>">
</head>
<body>
    <div class="bubbles" id="bubbles"></div>
    <div class="container">
        <div class="streak-chip" id="streak-chip"></div>
        <p class="streak-note" id="streak-note"></p>
        <header class="header">
            <div class="pisces-symbol">♓</div>
            <h1 class="greeting" id="greeting"></h1>
            <p class="date" id="date"></p>
            <p class="zodiac-label">Pisces · Water Sign · Dreamer</p>
            <div class="lucky-strip">
                <span class="lucky-item"><span class="lucky-label">№</span><span id="lucky-number"></span></span>
                <span class="lucky-divider">·</span>
                <span class="lucky-item"><span class="lucky-color-dot" id="lucky-color-dot"></span><span id="lucky-color-name"></span></span>
                <span class="lucky-divider">·</span>
                <span class="lucky-item" id="lucky-element"></span>
            </div>
        </header>

        <p class="mood-word" id="mood-word"></p>

        <section class="scores" id="scores"></section>

        <footer class="quote-section">
            <p class="quote-text" id="quote"></p>
            <p class="quote-author" id="quote-author"></p>
        </footer>
    </div>
    <script src="script.js"></script>
</body>
</html>
